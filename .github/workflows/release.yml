name: Release CLI binaries

# Builds the quickpatch CLI for every platform and attaches them to the
# GitHub Release whenever a v* tag is pushed.
#   git tag v1.0.6 && git push origin v1.0.6
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write # needed to upload assets to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            asset: quickpatch-macos-arm64
            archive: tar.gz
          - os: macos-13        # Intel Mac
            asset: quickpatch-macos-x64
            archive: tar.gz
          - os: ubuntu-latest
            asset: quickpatch-linux-x64
            archive: tar.gz
          - os: windows-latest
            asset: quickpatch-windows-x64
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.9.0"

      - name: Resolve dependencies
        run: dart pub get

      - name: Compile (Unix)
        if: matrix.archive == 'tar.gz'
        run: dart compile exe quickpatch_cli/bin/quickpatch.dart -o "${{ matrix.asset }}"

      - name: Compile (Windows)
        if: matrix.archive == 'zip'
        run: dart compile exe quickpatch_cli/bin/quickpatch.dart -o "${{ matrix.asset }}.exe"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: tar -czf "${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        run: Compress-Archive -Path "${{ matrix.asset }}.exe" -DestinationPath "${{ matrix.asset }}.zip"
        shell: pwsh

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}.${{ matrix.archive }}

      - name: Upload as workflow artifact (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.${{ matrix.archive }}
